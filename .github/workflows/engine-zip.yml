name: engine zip

# Builds runner.zip — the engine ("runner") source bundle the Millrace menu app
# (millrace/app) downloads, then `mojo build`s on-device. See scripts/package_engine.sh.
on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    paths: ["scripts/package_engine.sh", ".github/workflows/engine-zip.yml"]
  workflow_dispatch:

permissions:
  contents: write # to attach the zip to a Release on tags

jobs:
  zip:
    runs-on: macos-14
    steps:
      # Lay the three repos out as siblings, matching the dev layout the pixi
      # `flare-tls` task and the package script assume (../minja2, ../flare).
      - uses: actions/checkout@v6
        with:
          path: mojo-backend
      - uses: actions/checkout@v6
        with:
          repository: millrace/minja2
          path: minja2
      - uses: actions/checkout@v6
        with:
          repository: millrace/flare
          path: flare

      - uses: prefix-dev/setup-pixi@v0.9.6
        with:
          manifest-path: mojo-backend/pixi.toml

      - name: Build libflare_tls.so
        working-directory: mojo-backend
        run: pixi run flare-tls

      - name: Package runner.zip
        working-directory: mojo-backend
        run: pixi run bash scripts/package_engine.sh "$GITHUB_WORKSPACE/runner.zip"

      - uses: actions/upload-artifact@v7
        with:
          name: runner-zip
          path: runner.zip
          if-no-files-found: error

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: runner.zip
